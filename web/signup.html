<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Petals &amp; Posies</title>
    <link rel="stylesheet" href="Stylee.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/boxicons@latest/css/boxicons.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.0/css/all.min.css">
</head>
<body>

    <!-- Same as login.html but container starts with 'active' so signup panel shows first -->
    <div class="container active" id="container">

        <!-- Sign Up Panel -->
        <div class="form-container sign-up">
            <form id="signupForm" onsubmit="handleSignup(event)">
                <h1>Create Account</h1>
                <div class="social-icons">
                    <a href="#" class="icon"><i class="fa-brands fa-google-plus-g"></i></a>
                    <a href="#" class="icon"><i class="fa-brands fa-facebook-f"></i></a>
                    <a href="#" class="icon"><i class="fa-brands fa-instagram"></i></a>
                    <a href="#" class="icon"><i class="fa-brands fa-linkedin-in"></i></a>
                </div>
                <span>or use your email for registration</span>
                <input type="text"     id="signupName"     placeholder="Full Name"    required>
                <input type="email"    id="signupEmail"    placeholder="Email"         required>
                <input type="password" id="signupPassword" placeholder="Password (min 6 chars)" required minlength="6">
                <p class="form-error" id="signupError"></p>
                <button type="submit" id="signupBtn">Sign Up</button>
            </form>
        </div>

        <!-- Sign In Panel -->
        <div class="form-container sign-in">
            <form id="loginForm" onsubmit="handleLogin(event)">
                <h1>Log In</h1>
                <div class="social-icons">
                    <a href="#" class="icon"><i class="fa-brands fa-google-plus-g"></i></a>
                    <a href="#" class="icon"><i class="fa-brands fa-facebook-f"></i></a>
                    <a href="#" class="icon"><i class="fa-brands fa-instagram"></i></a>
                    <a href="#" class="icon"><i class="fa-brands fa-linkedin-in"></i></a>
                </div>
                <span>or use your email &amp; password</span>
                <input type="email"    id="loginEmail"    placeholder="Email"    required>
                <input type="password" id="loginPassword" placeholder="Password" required>
                <a href="#">Forgot Your Password?</a>
                <p class="form-error" id="loginError"></p>
                <button type="submit" id="loginBtn">Log In</button>
            </form>
        </div>

        <!-- Toggle Panel -->
        <div class="toggle-container">
            <div class="toggle">
                <div class="toggle-panel toggle-left">
                    <h1>Welcome Back!</h1>
                    <p>To keep connected with us please login with your personal info</p>
                    <button class="hidden" id="login">Log In</button>
                </div>
                <div class="toggle-panel toggle-right">
                    <h1>Hello, Friend!</h1>
                    <p>Enter your personal details and start your journey with us</p>
                    <button class="hidden" id="register">Sign Up</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script src="chatbot.js"></script>
</body>
</html>
